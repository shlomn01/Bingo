<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F2A541"/>
      <stop offset="100%" stop-color="#E8694A"/>
    </linearGradient>
  </defs>
  <!-- Rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- Grid lines -->
  <g stroke="#fff" stroke-width="1.5" opacity="0.5">
    <line x1="10" y1="26" x2="54" y2="26"/>
    <line x1="10" y1="38" x2="54" y2="38"/>
    <line x1="10" y1="50" x2="54" y2="50"/>
    <line x1="24.7" y1="14" x2="24.7" y2="54"/>
    <line x1="39.3" y1="14" x2="39.3" y2="54"/>
  </g>
  <!-- Cells background -->
  <rect x="10" y="14" width="44" height="40" rx="4" fill="none" stroke="#fff" stroke-width="2" opacity="0.7"/>
  <!-- BINGO text -->
  <text x="32" y="12" text-anchor="middle" font-family="Arial,sans-serif" font-weight="900" font-size="10" fill="#fff" letter-spacing="2">BINGO</text>
  <!-- Marked cells (dauber marks) -->
  <circle cx="17.3" cy="20" r="4.5" fill="#fff" opacity="0.85"/>
  <circle cx="32" cy="32" r="4.5" fill="#fff" opacity="0.85"/>
  <circle cx="46.7" cy="44" r="4.5" fill="#fff" opacity="0.85"/>
  <circle cx="17.3" cy="44" r="4.5" fill="#fff" opacity="0.85"/>
  <circle cx="46.7" cy="20" r="4.5" fill="#fff" opacity="0.85"/>
  <!-- Star on center -->
  <text x="32" y="35.5" text-anchor="middle" font-size="8" fill="#E8694A">★</text>
</svg>
